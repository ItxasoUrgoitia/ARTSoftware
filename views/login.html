<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarrera - ART Kudeaketa</title>
    
    <style>
        :root {
            --primary: #722F6A; /* Zure kolore morea */
            --text-dark: #111827;
            --text-muted: #6B7280;
            --bg-light: #FFFFFF; /* Ezkerreko hondoa zuri bihurtu da, irudiarekin bat egiteko */
            --border-color: #E5E7EB;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: white;
        }

        /* EZKERREKO ALDEA: Testua eta Logotipoa */
        .brand-side {
            flex: 1;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center; /* Elementu guztiak erdian zentratzeko */
            padding: 60px;
            border-right: 1px solid var(--border-color);
        }

        .brand-content {
            text-align: left; /* Testua ezkerrean lerrokatu */
            max-width: 450px;
        }

        /* Kolore-xehetasun more txikia */
        .accent-line {
            width: 40px;
            height: 4px;
            background-color: var(--primary);
            margin-bottom: 25px;
            border-radius: 2px;
        }

        .brand-side h1 {
            color: var(--text-dark);
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0 0 8px 0;
        }

        .brand-side h2 {
            color: var(--text-muted);
            font-size: 1.3rem;
            font-weight: 400;
            margin: 0 0 40px 0;
        }

        .brand-logo {
            max-width: 160px; /* Tamaina txikiagoa eta eleganta */
            width: 100%;
            height: auto;
            margin-top: 40px; /* Tartea testuaren eta logoaren artean */
            /* filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.03)); */
        }

        /* ESKUINEKO ALDEA: Logina */
        .form-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
        }

        .login-container {
            width: 100%;
            max-width: 380px;
            padding: 40px;
        }

        .login-container h3 {
            color: var(--text-dark);
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 10px 0;
        }

        .login-container p {
            color: var(--text-muted);
            font-size: 1rem;
            margin: 0 0 40px 0;
        }

        /* PIN Sarrera minimalista */
        .input-group {
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;
            color: var(--text-dark);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="password"] {
            width: 100%;
            box-sizing: border-box;
            padding: 16px;
            font-size: 1.5rem;
            letter-spacing: 8px;
            color: var(--text-dark);
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        input[type="password"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(114, 47, 106, 0.1);
        }

        /* Botoi Profesionala */
        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #5A2553;
        }

        #error-msg {
            color: #DC2626;
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 15px;
            padding: 12px;
            background-color: #FEF2F2;
            border: 1px solid #F87171;
            border-radius: 6px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="brand-side">
        <div class="brand-content">
            <div class="accent-line"></div>
            <h1>ART</h1>
            <h2>Garagardo Azoka</h2>
            <img src="/img/ARTLogo.png" alt="ART Garagardo Azoka Logotipoa" class="brand-logo">
        </div>
    </div>

    <div class="form-side">
        <div class="login-container">
            <h3>Saioa hasi</h3>
            <p>Sartu zure 4 digituko PIN kodea.</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="pin-input">PIN Kodea</label>
                    <input type="password" id="pin-input" inputmode="text" pattern="[A-Z0-9]{4}" required autocomplete="off" placeholder="••••">
                </div>
                <button type="submit">Sisteman Sartu</button>
            </form>

            <div id="error-msg"></div>
        </div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
