<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Kudeaketa - ART</title>
    
    <style>
        :root {
            --primary: #722F6A; 
            --primary-hover: #5A2553;
            --text-dark: #111827;
            --text-muted: #6B7280;
            --bg-main: #F9FAFB; 
            --bg-surface: #FFFFFF;
            --border-color: #E5E7EB;
            --success: #10B981; 
            --success-hover: #059669;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* GOIBURUA */
        .header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            height: 70px;
            padding: 0 40px;
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .accent-line {
            width: 8px;
            height: 30px;
            background-color: var(--primary);
            border-radius: 4px;
        }

        .header h1 { 
            margin: 0; 
            color: var(--text-dark); 
            font-size: 1.8rem; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }

        /* EDUKIONTZI NAGUSIA */
        .main-content {
            max-width: 1400px; /* Zabalagoa egin dut taula hobeto sartzeko */
            margin: 40px auto;
            padding: 0 20px;
        }

        .sekuentzia-titulua {
            font-size: 2.2rem; /* Izenburua handitua */
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        /* TAULA ESTILOA */
        .table-container {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: hidden; 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left; 
        }

        /* Goiburua */
        th { 
            background-color: var(--primary); 
            color: #FFFFFF; 
            font-size: 1.6rem; /* Goiburuko letrak handitua */
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 24px 30px; 
            border-bottom: 2px solid var(--primary-hover); 
        }

        /* Gelaxkak */
        td { 
            padding: 24px 30px; /* Gelaxkei altuera eta tarte handiagoa */
            border-bottom: 1px solid var(--border-color); 
            vertical-align: middle;
            font-size: 1.8rem; /* Letrak eta zenbakiak asko handituta */
        }
        
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #F8F9FA; }

        .produktu-izena {
            font-weight: 700;
            color: var(--text-dark);
        }

        /* EDIZIO ELEMENTUAK */
        .cell-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .item-text { 
            font-weight: 800; /* Zenbakiak ere lodiago */
            color: var(--text-dark);
            min-width: 100px; /* Espazio gehiago testuarentzat */
        }
        
        .edit-input {
            width: 130px; /* Kutxa zabalagoa */
            padding: 12px 16px; /* Kutxa altuagoa */
            font-size: 1.6rem; /* Input barruko letra handitua */
            font-weight: 700;
            color: var(--text-dark);
            border: 2px solid var(--primary);
            border-radius: 8px;
            outline: none;
            display: none; 
            box-sizing: border-box;
            background-color: #FAFAFA;
        }

        .edit-input:focus {
            background-color: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(114, 47, 106, 0.15);
        }

        /* BOTOIAK */
        .action-btn {
            border: none;
            padding: 12px 24px; /* Botoiak potoloagoak */
            border-radius: 8px; /* Botoi borobilagoak */
            font-weight: 700;
            font-size: 1.2rem; /* Botoiko letra handitua */
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 20px;
        }

        .edit-btn { 
            background-color: transparent; 
            color: var(--primary); 
            border: 2px solid var(--primary); /* Ertz lodiagoa */
        }
        .edit-btn:hover { 
            background-color: var(--primary); 
            color: white;
        }
        
        .save-btn { 
            background-color: var(--success); 
            color: white; 
            display: none; 
        }
        .save-btn:hover {
            background-color: var(--success-hover);
        }
        
        /* ZUTABEAK ZENTRATU */
        th:nth-child(2), th:nth-child(3),
        td:nth-child(2), td:nth-child(3) {
            width: 380px; /* Zabalera finkoa handitua elementu handiak sartzeko */
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-brand">
            <div class="accent-line"></div>
            <h1>ART</h1>
        </div>
    </div>
    
    <div class="main-content">
        <div class="sekuentzia-titulua">Inbentarioaren eta Prezioen Kudeaketa</div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Produktua</th>
                        <th>Prezioa</th>
                        <th>Stocka</th>
                    </tr>
                </thead>
                <tbody id="taula-gorputza">
                    <tr>
                        <td colspan="3" align="center" style="color: var(--text-muted); padding: 40px; font-size: 1.5rem;">
                            Datuak kargatzen...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/js/stock.js"></script>
</body>
</html>
